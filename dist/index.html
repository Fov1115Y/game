<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大便超人网页小游戏</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      color: #3a2718;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 30%),
        linear-gradient(135deg, #ffe77a 0%, #ffb84d 48%, #f27b39 100%);
    }

    .game-shell {
      width: min(1080px, 96vw);
      padding: 20px;
      border: 6px solid #6b330f;
      border-radius: 30px;
      background: #fff1b8;
      box-shadow: 0 18px 0 #8c4618, 0 28px 45px rgba(69, 29, 8, 0.32);
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 54px);
      color: #d61f1f;
      text-shadow: 3px 3px 0 #fff, 6px 6px 0 #71310b;
      letter-spacing: 2px;
    }

    .score-board {
      min-width: 150px;
      padding: 10px 16px;
      border: 4px solid #733610;
      border-radius: 18px;
      text-align: center;
      background: #fff9dd;
      box-shadow: inset 0 -5px 0 rgba(120, 62, 20, 0.16);
      font-weight: 800;
    }

    .score-board span {
      display: block;
      font-size: 32px;
      color: #d61f1f;
    }

    .stage {
      position: relative;
      overflow: hidden;
      height: 470px;
      border: 6px solid #6b330f;
      border-radius: 28px;
      background:
        radial-gradient(circle at 15% 20%, #ffffff 0 8%, transparent 9%),
        radial-gradient(circle at 82% 16%, #ffffff 0 6%, transparent 7%),
        linear-gradient(#7fd9ff 0 62%, #79c95c 63% 100%);
    }

    .sun {
      position: absolute;
      top: 28px;
      right: 92px;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: #ffe15a;
      box-shadow: 0 0 0 10px rgba(255, 225, 90, 0.28);
    }

    .cloud {
      position: absolute;
      top: 62px;
      left: 310px;
      width: 150px;
      height: 46px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      bottom: 12px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
    }

    .cloud::before {
      left: 20px;
    }

    .cloud::after {
      right: 18px;
    }

    .hero {
      position: absolute;
      left: 95px;
      bottom: 75px;
      width: 190px;
      height: 280px;
      transform-origin: 112px 225px;
      transition: transform 0.18s ease;
    }

    .hero.attack-line {
      animation: pose-thrust 0.72s ease-in-out;
    }

    .hero.attack-burst,
    .hero.attack-machine {
      animation: pose-rattle 1.35s ease-in-out;
    }

    .hero.attack-arc {
      animation: pose-arc 0.96s ease-in-out;
    }

    .hero.attack-giant {
      animation: pose-charge 1.22s ease-in-out;
    }

    .hero.attack-spiral {
      animation: pose-spin 1.05s ease-in-out;
    }

    .cape {
      position: absolute;
      left: 22px;
      top: 82px;
      width: 128px;
      height: 150px;
      border-radius: 70% 20% 70% 30%;
      background: #b81212;
      transform: rotate(-18deg);
      box-shadow: inset -14px -10px 0 rgba(87, 0, 0, 0.22);
    }

    .head {
      position: absolute;
      left: 74px;
      top: 4px;
      width: 78px;
      height: 78px;
      border: 5px solid #5a2c12;
      border-radius: 50%;
      background: #ffd19f;
      z-index: 2;
    }

    .hair {
      position: absolute;
      left: 82px;
      top: -5px;
      width: 54px;
      height: 28px;
      border-radius: 50% 50% 15px 15px;
      background: #44230f;
      z-index: 3;
    }

    .eye {
      position: absolute;
      top: 32px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #241107;
      z-index: 4;
    }

    .eye.left {
      left: 96px;
    }

    .eye.right {
      left: 128px;
    }

    .smile {
      position: absolute;
      left: 106px;
      top: 49px;
      width: 34px;
      height: 16px;
      border-bottom: 4px solid #852419;
      border-radius: 0 0 35px 35px;
      z-index: 4;
    }

    .body {
      position: absolute;
      left: 62px;
      top: 76px;
      width: 90px;
      height: 124px;
      border: 5px solid #661707;
      border-radius: 44px 44px 22px 22px;
      background: #e61919;
      box-shadow: inset -12px -8px 0 rgba(95, 0, 0, 0.18);
      z-index: 2;
    }

    .body::after {
      content: "";
      position: absolute;
      right: -20px;
      bottom: 18px;
      width: 34px;
      height: 42px;
      border: 5px solid #661707;
      border-left: 0;
      border-radius: 8px 28px 28px 8px;
      background: #d91515;
      box-shadow: inset -7px -4px 0 rgba(95, 0, 0, 0.16);
    }

    .emblem {
      position: absolute;
      left: 88px;
      top: 106px;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border: 4px solid #6b330f;
      border-radius: 50%;
      background: #ffe15a;
      color: #9a3b10;
      font-weight: 900;
      z-index: 4;
    }

    .butt-port {
      position: absolute;
      left: 150px;
      top: 166px;
      z-index: 5;
      width: 30px;
      height: 24px;
      border: 5px solid #5a2c12;
      border-radius: 50%;
      background: #ffb05f;
      box-shadow: inset -4px -3px 0 rgba(107, 51, 15, 0.2);
      transform: rotate(-5deg);
    }

    .butt-port::after {
      content: "";
      position: absolute;
      right: -24px;
      top: 2px;
      width: 28px;
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 237, 120, 0.88);
      opacity: 0;
      transform: scaleX(0.25);
      transform-origin: left center;
    }

    .hero[class*="attack-"] .butt-port::after {
      animation: port-flash 0.16s ease-out infinite alternate;
    }

    .arm,
    .leg {
      position: absolute;
      border: 5px solid #661707;
      background: #e61919;
      z-index: 1;
    }

    .arm.left {
      left: 34px;
      top: 102px;
      width: 38px;
      height: 106px;
      border-radius: 28px;
      transform: rotate(24deg);
    }

    .arm.right {
      left: 136px;
      top: 105px;
      width: 92px;
      height: 32px;
      border-radius: 28px;
      transform: rotate(-8deg);
      transform-origin: left center;
    }

    .fist {
      position: absolute;
      left: 213px;
      top: 107px;
      width: 38px;
      height: 38px;
      border: 4px solid #5a2c12;
      border-radius: 50%;
      background: #ffd19f;
      z-index: 3;
    }

    .leg.left {
      left: 70px;
      top: 188px;
      width: 34px;
      height: 86px;
      border-radius: 20px;
      transform: rotate(8deg);
    }

    .leg.right {
      left: 123px;
      top: 188px;
      width: 34px;
      height: 86px;
      border-radius: 20px;
      transform: rotate(-8deg);
    }

    .target-wrap {
      position: absolute;
      right: 92px;
      bottom: 58px;
      width: 270px;
      height: 330px;
    }

    .target-toy {
      position: absolute;
      inset: 0;
      z-index: 2;
      transform-origin: bottom center;
    }

    .toy-shadow {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 8px;
      height: 32px;
      border-radius: 50%;
      background: rgba(80, 40, 12, 0.24);
    }

    .toy-head {
      position: absolute;
      left: 55px;
      top: 12px;
      width: 162px;
      height: 146px;
      border: 7px solid #5b3218;
      border-radius: 48% 48% 45% 45%;
      background: #b9793e;
      box-shadow: inset -16px -12px 0 rgba(86, 42, 14, 0.18);
      z-index: 4;
    }

    .toy-ear {
      position: absolute;
      top: -22px;
      width: 62px;
      height: 62px;
      border: 7px solid #5b3218;
      border-radius: 50%;
      background: #a86432;
      z-index: -1;
    }

    .toy-ear::after {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 50%;
      background: #e3a66c;
    }

    .toy-ear.left {
      left: -24px;
    }

    .toy-ear.right {
      right: -24px;
    }

    .toy-eye {
      position: absolute;
      top: 56px;
      width: 18px;
      height: 22px;
      border-radius: 50%;
      background: #201008;
      transition: height 0.16s ease, transform 0.16s ease;
    }

    .toy-eye.left {
      left: 48px;
    }

    .toy-eye.right {
      right: 48px;
    }

    .toy-snout {
      position: absolute;
      left: 47px;
      top: 76px;
      width: 68px;
      height: 46px;
      border: 5px solid #5b3218;
      border-radius: 45% 45% 52% 52%;
      background: #f1c08a;
    }

    .toy-nose {
      position: absolute;
      left: 21px;
      top: 9px;
      width: 26px;
      height: 16px;
      border-radius: 50%;
      background: #2b160b;
    }

    .toy-mouth {
      position: absolute;
      left: 26px;
      top: 27px;
      width: 18px;
      height: 10px;
      border-bottom: 4px solid #6d2618;
      border-radius: 0 0 20px 20px;
      transition: transform 0.16s ease, border-radius 0.16s ease;
    }

    .toy-body {
      position: absolute;
      left: 43px;
      top: 132px;
      width: 182px;
      height: 154px;
      border: 7px solid #5b3218;
      border-radius: 48% 48% 38% 38%;
      background: #bd7b40;
      box-shadow: inset -18px -10px 0 rgba(86, 42, 14, 0.16);
      z-index: 2;
    }

    .toy-belly {
      position: absolute;
      left: 45px;
      top: 35px;
      width: 92px;
      height: 82px;
      border-radius: 50%;
      background: #f0bf84;
    }

    .toy-paw,
    .toy-foot {
      position: absolute;
      border: 6px solid #5b3218;
      background: #a86432;
      z-index: 3;
    }

    .toy-paw {
      top: 162px;
      width: 58px;
      height: 82px;
      border-radius: 999px;
    }

    .toy-paw.left {
      left: 24px;
      transform: rotate(18deg);
    }

    .toy-paw.right {
      right: 24px;
      transform: rotate(-18deg);
    }

    .toy-foot {
      bottom: 18px;
      width: 76px;
      height: 48px;
      border-radius: 45px 45px 30px 30px;
    }

    .toy-foot.left {
      left: 46px;
      transform: rotate(5deg);
    }

    .toy-foot.right {
      right: 46px;
      transform: rotate(-5deg);
    }

    .toy-label {
      position: absolute;
      left: 50%;
      top: 238px;
      z-index: 6;
      min-width: 132px;
      max-width: 178px;
      padding: 8px 12px;
      border: 5px solid #6b330f;
      border-radius: 14px;
      background: #fff4a8;
      color: #c71f1f;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.15;
      word-break: break-word;
      box-shadow: 0 6px 0 #8b4a16;
      transform: translateX(-50%) rotate(-2deg);
    }

    #targetNameText {
      display: block;
    }

    .stains {
      position: absolute;
      left: 32px;
      top: 24px;
      width: 204px;
      height: 250px;
      pointer-events: none;
      overflow: hidden;
      border-radius: 38%;
      z-index: 8;
    }

    .target-toy.sad .toy-eye {
      height: 8px;
      transform: translateY(7px);
    }

    .target-toy.sad .toy-mouth {
      transform: rotate(180deg) translateY(-4px);
      border-radius: 20px 20px 0 0;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.1fr 1.3fr auto;
      gap: 14px;
      align-items: stretch;
      margin-top: 16px;
    }

    .panel {
      padding: 14px;
      border: 4px solid #743612;
      border-radius: 20px;
      background: #fff9dd;
      box-shadow: inset 0 -6px 0 rgba(120, 62, 20, 0.12);
    }

    .panel-title {
      display: block;
      margin-bottom: 10px;
      font-size: 15px;
      font-weight: 900;
      color: #8a3d12;
    }

    .name-row {
      display: flex;
      gap: 8px;
    }

    input {
      width: 100%;
      border: 3px solid #7d3b13;
      border-radius: 14px;
      padding: 11px 12px;
      font: inherit;
      font-weight: 700;
      color: #5d2b0e;
      background: #fffdf5;
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 0 4px rgba(255, 210, 77, 0.55);
    }

    button,
    .mode-card {
      border: 4px solid #71310b;
      border-radius: 16px;
      font: inherit;
      font-weight: 900;
      color: #562206;
      background: linear-gradient(#ffe980, #ffbe3b);
      cursor: pointer;
      box-shadow: 0 6px 0 #8b4614;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    button:hover,
    .mode-card:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    button:active,
    .mode-card:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #8b4614;
    }

    button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.45);
      opacity: 0.75;
    }

    #setNameButton {
      white-space: nowrap;
      padding: 0 14px;
    }

    .mode-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .mode-card {
      padding: 10px;
      min-height: 86px;
      text-align: left;
      background: linear-gradient(#fff4a2, #ffc449);
    }

    .mode-card.active {
      background: linear-gradient(#ff7e4d, #f02828);
      color: #fff;
      box-shadow: 0 6px 0 #7b170f, 0 0 0 5px rgba(255, 236, 111, 0.8);
    }

    .mode-name {
      display: block;
      margin-bottom: 5px;
      font-size: 17px;
    }

    .mode-desc {
      display: block;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
      opacity: 0.86;
    }

    .action-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      min-width: 170px;
    }

    .action-panel button {
      min-height: 56px;
      padding: 8px 20px;
      font-size: 20px;
    }

    #fireButton {
      color: #fff;
      background: linear-gradient(#ff6b58, #d91f1f);
      box-shadow: 0 6px 0 #7d130f;
    }

    #resetButton {
      background: linear-gradient(#dff7ff, #79d8ff);
    }

    .projectile {
      position: absolute;
      left: var(--start-x);
      top: var(--start-y);
      z-index: 10;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 4px solid #4b2610;
      border-radius: 50% 48% 44% 52%;
      background: radial-gradient(circle at 38% 30%, #b77935 0 26%, #704016 28% 100%);
      box-shadow: inset -4px -5px 0 rgba(45, 22, 5, 0.25);
      transform: translate(-50%, -50%);
      animation-duration: var(--duration);
      animation-delay: var(--delay);
      animation-fill-mode: forwards;
      animation-timing-function: cubic-bezier(0.18, 0.88, 0.34, 1.03);
    }

    .projectile::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 229, 159, 0.8);
      transform: translate(-5px, -5px);
    }

    .projectile.line {
      animation-name: fly-line;
    }

    .projectile.spread {
      animation-name: fly-spread;
    }

    .projectile.arc {
      animation-name: fly-arc;
    }

    .projectile.giant {
      width: 72px;
      height: 72px;
      border-width: 6px;
      animation-name: fly-giant;
      box-shadow: inset -9px -9px 0 rgba(45, 22, 5, 0.25), 0 0 0 10px rgba(255, 235, 102, 0.22);
    }

    .projectile.machine {
      width: 22px;
      height: 22px;
      border-width: 3px;
      animation-name: fly-machine;
      animation-timing-function: linear;
    }

    .projectile.spiral {
      animation-name: fly-spiral;
      box-shadow: inset -4px -5px 0 rgba(45, 22, 5, 0.25), 0 0 0 6px rgba(255, 132, 69, 0.24);
    }

    .stain {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--size);
      height: var(--size);
      border-radius: 52% 45% 58% 43%;
      background: radial-gradient(circle at 32% 28%, #a46329 0 18%, #5d3718 20% 100%);
      opacity: 0.9;
      transform: rotate(var(--rotate));
      animation: pop-stain 0.22s ease-out both;
    }

    .stain::before,
    .stain::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: #5d3718;
    }

    .stain::before {
      width: 45%;
      height: 45%;
      left: -12%;
      bottom: 8%;
    }

    .stain::after {
      width: 36%;
      height: 36%;
      right: -10%;
      top: 16%;
    }

    .toast {
      position: absolute;
      right: 300px;
      top: 145px;
      z-index: 20;
      padding: 8px 13px;
      border: 3px solid #6b330f;
      border-radius: 999px;
      background: #fffdf2;
      color: #d61f1f;
      font-weight: 900;
      box-shadow: 0 5px 0 #8b4614;
      animation: toast-up 0.9s ease-out forwards;
      pointer-events: none;
    }

    .hit-shake {
      animation: hit-shake 0.32s ease-in-out;
    }

    .hit-slam {
      animation: hit-slam 0.5s ease-in-out;
    }

    .hit-rattle {
      animation: hit-rattle 0.42s ease-in-out;
    }

    @keyframes fly-line {
      to {
        left: var(--end-x);
        top: var(--end-y);
        transform: translate(-50%, -50%) rotate(720deg) scale(1.05);
      }
    }

    @keyframes fly-spread {
      45% {
        left: var(--mid-x);
        top: var(--mid-y);
      }
      to {
        left: var(--end-x);
        top: var(--end-y);
        transform: translate(-50%, -50%) rotate(900deg) scale(0.95);
      }
    }

    @keyframes fly-arc {
      48% {
        left: var(--mid-x);
        top: var(--arc-y);
        transform: translate(-50%, -50%) rotate(420deg) scale(1.12);
      }
      to {
        left: var(--end-x);
        top: var(--end-y);
        transform: translate(-50%, -50%) rotate(840deg) scale(1);
      }
    }

    @keyframes fly-giant {
      45% {
        left: var(--mid-x);
        top: var(--arc-y);
        transform: translate(-50%, -50%) rotate(260deg) scale(1.2);
      }
      to {
        left: var(--end-x);
        top: var(--end-y);
        transform: translate(-50%, -50%) rotate(620deg) scale(1.35);
      }
    }

    @keyframes fly-machine {
      to {
        left: var(--end-x);
        top: var(--end-y);
        transform: translate(-50%, -50%) rotate(520deg) scale(0.9);
      }
    }

    @keyframes fly-spiral {
      28% {
        left: var(--mid-x);
        top: calc(var(--mid-y) - 70px);
        transform: translate(-50%, -50%) rotate(340deg) scale(1.2);
      }
      58% {
        left: calc(var(--mid-x) + 60px);
        top: calc(var(--mid-y) + 46px);
        transform: translate(-50%, -50%) rotate(720deg) scale(0.92);
      }
      to {
        left: var(--end-x);
        top: var(--end-y);
        transform: translate(-50%, -50%) rotate(1120deg) scale(1.05);
      }
    }

    @keyframes hit-shake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-5deg) translateX(-7px); }
      45% { transform: rotate(4deg) translateX(7px); }
      70% { transform: rotate(-3deg) translateX(-4px); }
    }

    @keyframes hit-slam {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      35% { transform: translateY(18px) rotate(-7deg) scale(1.08, 0.9); }
      68% { transform: translateY(-8px) rotate(5deg) scale(0.96, 1.06); }
    }

    @keyframes hit-rattle {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      15% { transform: translateX(-11px) rotate(-4deg); }
      30% { transform: translateX(10px) rotate(4deg); }
      45% { transform: translateX(-8px) rotate(-3deg); }
      60% { transform: translateX(7px) rotate(3deg); }
      75% { transform: translateX(-4px) rotate(-2deg); }
    }

    @keyframes pose-thrust {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      22% { transform: translateX(-8px) rotate(-5deg); }
      45% { transform: translateX(20px) rotate(8deg); }
    }

    @keyframes pose-rattle {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      10%, 30%, 50%, 70% { transform: translateX(14px) rotate(6deg); }
      20%, 40%, 60%, 80% { transform: translateX(-7px) rotate(-4deg); }
    }

    @keyframes pose-arc {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      26% { transform: translateY(-18px) rotate(-12deg); }
      52% { transform: translateY(10px) rotate(12deg); }
    }

    @keyframes pose-charge {
      0%, 100% { transform: translateX(0) scale(1); }
      18% { transform: translateX(-16px) scale(0.94, 1.08) rotate(-7deg); }
      48% { transform: translateX(30px) scale(1.12, 0.9) rotate(10deg); }
      68% { transform: translateX(4px) scale(0.98, 1.02); }
    }

    @keyframes pose-spin {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      25% { transform: rotate(-12deg) translateY(-10px); }
      55% { transform: rotate(16deg) translateY(6px); }
    }

    @keyframes port-flash {
      from { opacity: 0.2; transform: scaleX(0.25); }
      to { opacity: 1; transform: scaleX(1.15); }
    }

    @keyframes pop-stain {
      0% { transform: scale(0.2) rotate(var(--rotate)); opacity: 0; }
      100% { transform: scale(1) rotate(var(--rotate)); opacity: 0.9; }
    }

    @keyframes toast-up {
      0% { transform: translateY(16px) scale(0.85); opacity: 0; }
      18% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-54px) scale(1.05); opacity: 0; }
    }

    @media (max-width: 820px) {
      body {
        align-items: flex-start;
        padding: 10px 0;
      }

      .game-header,
      .controls {
        grid-template-columns: 1fr;
        display: grid;
      }

      .stage {
        height: 430px;
      }

      .hero {
        left: 25px;
        transform: scale(0.82);
        transform-origin: bottom left;
      }

      .target-wrap {
        right: 18px;
        transform: scale(0.86);
        transform-origin: bottom right;
      }

      .mode-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="大便超人网页小游戏">
    <header class="game-header">
      <h1>大便超人</h1>
      <div class="score-board" aria-live="polite">
        命中次数
        <span id="hitCountText">0</span>
      </div>
    </header>

    <section id="stage" class="stage" aria-label="游戏舞台">
      <div class="sun" aria-hidden="true"></div>
      <div class="cloud" aria-hidden="true"></div>

      <div class="hero" id="hero" aria-label="穿红色紧身衣的卡通角色">
        <div class="cape"></div>
        <div class="hair"></div>
        <div class="head"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>
        <div class="body"></div>
        <div class="emblem">便</div>
        <div class="butt-port" aria-hidden="true"></div>
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="fist"></div>
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>

      <div class="target-wrap" aria-label="目标小熊玩偶">
        <div id="standee" class="target-toy">
          <div class="toy-shadow"></div>
          <div class="toy-head">
            <div class="toy-ear left"></div>
            <div class="toy-ear right"></div>
            <div class="toy-eye left"></div>
            <div class="toy-eye right"></div>
            <div class="toy-snout">
              <div class="toy-nose"></div>
              <div class="toy-mouth"></div>
            </div>
          </div>
          <div class="toy-body">
            <div class="toy-belly"></div>
          </div>
          <div class="toy-paw left"></div>
          <div class="toy-paw right"></div>
          <div class="toy-foot left"></div>
          <div class="toy-foot right"></div>
          <div class="toy-label"><span id="targetNameText">小熊玩偶</span></div>
          <div id="stainLayer" class="stains" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="操作区">
      <div class="panel">
        <label class="panel-title" for="nameInput">小熊名牌</label>
        <div class="name-row">
          <input id="nameInput" type="text" maxlength="12" value="小熊玩偶" aria-label="输入小熊名牌">
          <button id="setNameButton" type="button">改名</button>
        </div>
      </div>

      <div class="panel">
        <span class="panel-title">发射方式</span>
        <div id="modeSelect" class="mode-list" role="list"></div>
      </div>

      <div class="panel action-panel">
        <button id="fireButton" type="button">发射！</button>
        <button id="resetButton" type="button">重置</button>
      </div>
    </section>
  </main>

  <script>
    const attackModes = [
      {
        id: "single",
        label: "精准屁弹",
        description: "屁股蓄力，直线一击。",
        projectileCount: 1,
        trajectory: "line",
        pose: "line",
        impact: "hit-shake",
        delayStep: 120,
        duration: 650
      },
      {
        id: "burst",
        label: "三连喷射",
        description: "连续三发，左右散射。",
        projectileCount: 3,
        trajectory: "spread",
        pose: "burst",
        impact: "hit-rattle",
        delayStep: 110,
        duration: 620
      },
      {
        id: "arc",
        label: "高抛臭弹",
        description: "翘臀上抛，砸向小熊。",
        projectileCount: 1,
        trajectory: "arc",
        pose: "arc",
        impact: "hit-slam",
        delayStep: 120,
        duration: 820
      },
      {
        id: "giant",
        label: "超大粪便",
        description: "全身蓄力，巨型重击。",
        projectileCount: 1,
        trajectory: "giant",
        pose: "giant",
        impact: "hit-slam",
        delayStep: 140,
        duration: 980,
        score: 3,
        stainSize: "big"
      },
      {
        id: "machine",
        label: "机关枪喷射",
        description: "快速连喷，小弹幕扫射。",
        projectileCount: 9,
        trajectory: "machine",
        pose: "machine",
        impact: "hit-rattle",
        delayStep: 70,
        duration: 430
      },
      {
        id: "spiral",
        label: "螺旋臭屁弹",
        description: "旋转出膛，弯曲命中。",
        projectileCount: 4,
        trajectory: "spiral",
        pose: "spiral",
        impact: "hit-shake",
        delayStep: 95,
        duration: 760
      }
    ];

    const state = {
      targetName: "小熊玩偶",
      attackMode: "single",
      hitCount: 0,
      stainCount: 0,
      isAnimating: false
    };

    const elements = {
      stage: document.getElementById("stage"),
      hero: document.getElementById("hero"),
      standee: document.getElementById("standee"),
      targetNameText: document.getElementById("targetNameText"),
      nameInput: document.getElementById("nameInput"),
      setNameButton: document.getElementById("setNameButton"),
      modeSelect: document.getElementById("modeSelect"),
      fireButton: document.getElementById("fireButton"),
      resetButton: document.getElementById("resetButton"),
      hitCountText: document.getElementById("hitCountText"),
      stainLayer: document.getElementById("stainLayer")
    };

    function getMode(modeId) {
      return attackModes.find((mode) => mode.id === modeId) || attackModes[0];
    }

    function setTargetName(name) {
      const cleanedName = name.trim().slice(0, 12);
      state.targetName = cleanedName || "小熊玩偶";
      elements.nameInput.value = state.targetName;
      renderState();
    }

    function setAttackMode(modeId) {
      state.attackMode = getMode(modeId).id;
      renderState();
    }

    function addHit(amount) {
      state.hitCount += amount;
      renderState();
    }

    function resetGame() {
      state.hitCount = 0;
      state.stainCount = 0;
      state.isAnimating = false;
      elements.fireButton.disabled = false;
    }

    function renderModeCards() {
      elements.modeSelect.innerHTML = "";
      attackModes.forEach((mode) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "mode-card";
        card.dataset.modeId = mode.id;
        card.setAttribute("role", "listitem");
        card.innerHTML = `
          <span class="mode-name">${mode.label}</span>
          <span class="mode-desc">${mode.description}</span>
        `;
        elements.modeSelect.appendChild(card);
      });
    }

    function renderState() {
      elements.targetNameText.textContent = state.targetName;
      elements.hitCountText.textContent = String(state.hitCount);
      elements.fireButton.disabled = state.isAnimating;
      document.querySelectorAll(".mode-card").forEach((card) => {
        card.classList.toggle("active", card.dataset.modeId === state.attackMode);
      });
    }

    function clearVisualEffects() {
      elements.stainLayer.innerHTML = "";
      document.querySelectorAll(".projectile, .toast").forEach((element) => element.remove());
      elements.hero.className = "hero";
      elements.standee.classList.remove("hit-shake", "hit-slam", "hit-rattle", "sad");
    }

    function bindEvents() {
      elements.setNameButton.addEventListener("click", () => {
        setTargetName(elements.nameInput.value);
      });

      elements.nameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          setTargetName(elements.nameInput.value);
        }
      });

      elements.modeSelect.addEventListener("click", (event) => {
        const card = event.target.closest(".mode-card");
        if (!card) {
          return;
        }
        setAttackMode(card.dataset.modeId);
      });

      elements.fireButton.addEventListener("click", fireAttack);

      elements.resetButton.addEventListener("click", () => {
        resetGame();
        clearVisualEffects();
        renderState();
      });
    }

    function fireAttack() {
      if (state.isAnimating) {
        return;
      }

      const mode = getMode(state.attackMode);
      state.isAnimating = true;
      playHeroPose(mode);
      renderState();

      for (let index = 0; index < mode.projectileCount; index += 1) {
        createProjectile({
          mode,
          index,
          total: mode.projectileCount
        });
      }

      const totalDuration = mode.duration + mode.projectileCount * mode.delayStep + 220;
      window.setTimeout(() => {
        state.isAnimating = false;
        elements.hero.className = "hero";
        renderState();
      }, totalDuration);
    }

    function playHeroPose(mode) {
      elements.hero.className = `hero attack-${mode.pose}`;
    }

    function createProjectile(options) {
      const projectile = document.createElement("div");
      const stageRect = elements.stage.getBoundingClientRect();
      const offset = options.index - (options.total - 1) / 2;
      const wave = options.index % 2 === 0 ? 1 : -1;
      const startX = 270;
      const startY = 258 + offset * 4;
      const endX = stageRect.width - 215;
      const baseEndY = options.mode.trajectory === "giant" ? 182 : 170;
      const endY = baseEndY + offset * 21 + wave * 9;
      const delay = options.index * options.mode.delayStep;
      const duration = options.mode.duration;

      projectile.className = `projectile ${options.mode.trajectory}`;
      projectile.dataset.score = String(options.mode.score || 1);
      projectile.dataset.impact = options.mode.impact;
      projectile.dataset.stainSize = options.mode.stainSize || "normal";
      projectile.style.setProperty("--start-x", `${startX}px`);
      projectile.style.setProperty("--start-y", `${startY}px`);
      projectile.style.setProperty("--end-x", `${endX}px`);
      projectile.style.setProperty("--end-y", `${endY}px`);
      projectile.style.setProperty("--mid-x", `${(startX + endX) / 2 + wave * 24}px`);
      projectile.style.setProperty("--mid-y", `${endY - offset * 44 - wave * 18}px`);
      projectile.style.setProperty("--arc-y", `${Math.max(64, endY - 165)}px`);
      projectile.style.setProperty("--delay", `${delay}ms`);
      projectile.style.setProperty("--duration", `${duration}ms`);

      projectile.addEventListener("animationend", () => finishProjectile(projectile), { once: true });
      elements.stage.appendChild(projectile);
    }

    function finishProjectile(projectile) {
      const score = Number(projectile.dataset.score || 1);
      const impact = projectile.dataset.impact || "hit-shake";
      const stainSize = projectile.dataset.stainSize || "normal";
      projectile.remove();
      applyHitEffect(score, impact, stainSize);
    }

    function applyHitEffect(amount, impactClass, stainSize) {
      addHit(amount);
      addStain(stainSize);
      showToast(randomHitText(amount));
      elements.standee.classList.remove("hit-shake", "hit-slam", "hit-rattle");
      void elements.standee.offsetWidth;
      elements.standee.classList.add(impactClass, "sad");
      window.setTimeout(() => elements.standee.classList.remove(impactClass), 520);
    }

    function addStain(stainSize) {
      const stain = document.createElement("span");
      const isBig = stainSize === "big";
      const size = (isBig ? 52 : 24) + Math.floor(Math.random() * (isBig ? 28 : 24));
      const x = 18 + Math.floor(Math.random() * 140);
      const y = 26 + Math.floor(Math.random() * 164);
      const rotate = -35 + Math.floor(Math.random() * 70);

      state.stainCount += 1;
      stain.className = "stain";
      stain.style.setProperty("--size", `${size}px`);
      stain.style.setProperty("--x", `${x}px`);
      stain.style.setProperty("--y", `${y}px`);
      stain.style.setProperty("--rotate", `${rotate}deg`);
      elements.stainLayer.appendChild(stain);
    }

    function showToast(text) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = text;
      elements.stage.appendChild(toast);
      toast.addEventListener("animationend", () => toast.remove(), { once: true });
    }

    function randomHitText(amount) {
      const texts = amount > 1
        ? ["巨型命中！", "小熊弹飞！", "重击成功！", "大招糊上！"]
        : ["命中！", "小熊晃了！", "漂亮一击！", "玩偶遭殃！", "连续压制！"];
      return texts[Math.floor(Math.random() * texts.length)];
    }

    renderModeCards();
    renderState();
    bindEvents();
  </script>
</body>
</html>
